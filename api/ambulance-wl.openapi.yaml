openapi: 3.0.0
servers:
  - description: Cluster Endpoint
    url: /api
info:
  description: Blood Bag Management System for Web-In-Cloud system
  version: "2.0.0"
  title: Blood Bank API
  contact:
    email: alexander8.matuska@gmail.com
  license:
    name: CC BY 4.0
    url: "https://creativecommons.org/licenses/by/4.0/"
tags:
- name: bloodBankBags
  description: Blood Bank Bags API
- name: bloodBanks
  description: Blood Bank management
paths:
  "/blood-bank":
    post:
      tags:
        - bloodBanks
      summary: Creates new blood bank
      operationId: createBloodBank
      description: Use this method to initialize a new blood bank in the system
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BloodBank"
            examples:
              request-sample:
                $ref: "#/components/examples/BloodBankExample"
        description: Blood bank details to store
        required: true
      responses:
        "201":
          description: Value of the stored blood bank
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodBank"
              examples:
                updated-response:
                  $ref: "#/components/examples/BloodBankExample"
        "400":
          description: Missing mandatory properties of input object.
        "409":
          description: Entry with the specified id already exists
  "/blood-bank/{bloodBankId}":
    delete:
      tags:
        - bloodBanks
      summary: Deletes specific blood bank
      operationId: deleteBloodBank
      description: Use this method to delete the specific blood bank from the system.
      parameters:
        - in: path
          name: bloodBankId
          description: pass the id of the particular blood bank
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Item deleted
        "404":
          description: Blood bank with such ID does not exist
  "/blood-bank/{bloodBankId}/bags":
    get:
      tags:
        - bloodBankBags
      summary: Provides the list of blood bags in the bank
      operationId: getBloodBags
      description: By using bloodBankId you get list of blood bags, optionally filtered by blood group and Rh factor
      parameters:
        - in: path
          name: bloodBankId
          description: pass the id of the particular blood bank
          required: true
          schema:
            type: string
        - in: query
          name: bloodGroup
          description: filter by blood group
          schema:
            type: string
            enum: [A, B, AB, O]
        - in: query
          name: rhFactor
          description: filter by Rh factor
          schema:
            type: string
            enum: [positive, negative]
      responses:
        "200":
          description: list of blood bags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BloodBag"
              examples:
                response:
                  $ref: "#/components/examples/BloodBagsListExample"
        "404":
          description: Blood bank with such ID does not exist
    post:
      tags:
        - bloodBankBags
      summary: Registers a new blood bag
      operationId: createBloodBag
      description: Use this method to register a new blood bag in the blood bank.
      parameters:
        - in: path
          name: bloodBankId
          description: pass the id of the particular blood bank
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BloodBag"
            examples:
              request-sample:
                $ref: "#/components/examples/BloodBagExample"
        description: Blood bag to register
        required: true
      responses:
        "201":
          description: Value of the registered blood bag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodBag"
              examples:
                updated-response:
                  $ref: "#/components/examples/BloodBagExample"
        "400":
          description: Missing mandatory properties of input object.
        "404":
          description: Blood bank with such ID does not exist
        "409":
          description: Entry with the specified id already exists
  "/blood-bank/{bloodBankId}/bags/{bagId}":
    get:
      tags:
        - bloodBankBags
      summary: Provides details about a specific blood bag
      operationId: getBloodBag
      description: By using bloodBankId and bagId you can get details of a particular blood bag.
      parameters:
        - in: path
          name: bloodBankId
          description: pass the id of the particular blood bank
          required: true
          schema:
            type: string
        - in: path
          name: bagId
          description: pass the id of the particular blood bag
          required: true
          schema:
            type: string
      responses:
        "200":
          description: value of the blood bag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodBag"
              examples:
                response:
                  $ref: "#/components/examples/BloodBagExample"
        "404":
          description: Blood bank or blood bag with such ID does not exist
    put:
      tags:
        - bloodBankBags
      summary: Updates specific blood bag
      operationId: updateBloodBag
      description: Use this method to update content of the blood bag entry.
      parameters:
        - in: path
          name: bloodBankId
          description: pass the id of the particular blood bank
          required: true
          schema:
            type: string
        - in: path
          name: bagId
          description: pass the id of the particular blood bag
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BloodBag"
            examples:
              request:
                $ref: "#/components/examples/BloodBagExample"
        description: Blood bag data to update
        required: true
      responses:
        "200":
          description: value of the updated blood bag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodBag"
              examples:
                response:
                  $ref: "#/components/examples/BloodBagExample"
        "400":
          description: Missing mandatory properties of input object.
        "404":
          description: Blood bank or blood bag with such ID does not exist
    delete:
      tags:
        - bloodBankBags
      summary: Deletes specific blood bag
      operationId: deleteBloodBag
      description: Use this method to delete the specific blood bag from the blood bank.
      parameters:
        - in: path
          name: bloodBankId
          description: pass the id of the particular blood bank
          required: true
          schema:
            type: string
        - in: path
          name: bagId
          description: pass the id of the particular blood bag
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Item deleted
        "404":
          description: Blood bank or blood bag with such ID does not exist
components:
  schemas:
    BloodBag:
      type: object
      required: [id, bloodGroup, rhFactor, collectionDate, volume, status]
      properties:
        id:
          type: string
          example: bag-001
          description: Unique identifier of the blood bag
        bloodGroup:
          type: string
          enum: [A, B, AB, O]
          example: A
          description: Blood group of the donor
        rhFactor:
          type: string
          enum: [positive, negative]
          example: positive
          description: Rh factor of the blood
        collectionDate:
          type: string
          format: date-time
          example: "2025-03-15T08:30:00Z"
          description: Date and time when the blood was collected
        volume:
          type: integer
          format: int32
          example: 450
          description: Volume of blood in milliliters
        status:
          type: string
          enum: [available, reserved, issued, expired, destroyed]
          example: available
          description: Current status of the blood bag
        donorId:
          type: string
          example: donor-001
          description: Identifier of the blood donor
        notes:
          type: string
          example: ""
          description: Additional notes about the blood bag
        createdAt:
          type: string
          format: date-time
          example: "2025-03-15T08:30:00Z"
          description: Timestamp when the record was created
      example:
        $ref: "#/components/examples/BloodBagExample"
    BloodBank:
      type: object
      required: ["id", "name"]
      properties:
        id:
          type: string
          example: centralna-banka
          description: Unique identifier of the blood bank
        name:
          type: string
          example: "Centralna krvna banka"
          description: Human readable display name of the blood bank
        bloodBags:
          type: array
          items:
            $ref: "#/components/schemas/BloodBag"
      example:
        $ref: "#/components/examples/BloodBankExample"
  examples:
    BloodBagExample:
      summary: Sample blood bag
      description: |
        Example of a registered blood bag
      value:
        id: bag-001
        bloodGroup: A
        rhFactor: positive
        collectionDate: "2025-03-15T08:30:00.000Z"
        volume: 450
        status: available
        donorId: donor-001
        notes: ""
        createdAt: "2025-03-15T08:30:00.000Z"
    BloodBagsListExample:
      summary: List of blood bags
      description: |
        Example list containing 2 blood bags
      value:
        - id: bag-001
          bloodGroup: A
          rhFactor: positive
          collectionDate: "2025-03-15T08:30:00.000Z"
          volume: 450
          status: available
          donorId: donor-001
          createdAt: "2025-03-15T08:30:00.000Z"
        - id: bag-002
          bloodGroup: O
          rhFactor: negative
          collectionDate: "2025-03-14T14:00:00.000Z"
          volume: 350
          status: reserved
          donorId: donor-002
          createdAt: "2025-03-14T14:00:00.000Z"
    BloodBankExample:
      summary: Sample blood bank
      description: |
        Example of a blood bank with blood bags
      value:
        id: centralna-banka
        name: "Centralna krvna banka"
        bloodBags:
          - id: bag-001
            bloodGroup: A
            rhFactor: positive
            collectionDate: "2025-03-15T08:30:00.000Z"
            volume: 450
            status: available
            donorId: donor-001
            createdAt: "2025-03-15T08:30:00.000Z"
          - id: bag-002
            bloodGroup: O
            rhFactor: negative
            collectionDate: "2025-03-14T14:00:00.000Z"
            volume: 350
            status: reserved
            donorId: donor-002
            createdAt: "2025-03-14T14:00:00.000Z"
