apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- deployment.yaml
- service.yaml

configMapGenerator:
  - name: cv3am-ambulance-webapi-mongodb-init
    files:
      - params/init-db.js
  - name: cv3am-ambulance-webapi-config
    literals:
      - database=cv3am-blood-bank
      - collection=blood-bank
patches:
- path: patches/webapi.deployment.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: cv3am-ambulance-webapi
